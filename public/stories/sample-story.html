<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sample Story (placeholder)</title>
<style>
  body {
    margin: 0;
    background: #111;
    color: #ece8df;
    font-family: Georgia, "Times New Roman", serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    box-sizing: border-box;
  }
  .card {
    max-width: 520px;
    text-align: center;
    line-height: 1.6;
  }
  h1 { font-weight: 400; letter-spacing: 0.01em; }
  code {
    background: rgba(255,255,255,0.08);
    padding: 0.1em 0.4em;
    border-radius: 3px;
    font-size: 0.9em;
  }
  .hint { color: #9a958a; font-size: 0.9rem; margin-top: 1.5rem; }
</style>
</head>
<body>
  <div class="card">
    <h1>Story placeholder</h1>
    <p>
      Drop a Twine export into <code>public/stories/</code> and reference it
      from a story entry in <code>src/content/stories/</code>.
    </p>
    <p class="hint">
      In Twine: <em>Publish to File</em> → save into the project's
      <code>public/stories/</code> folder, then set <code>file:</code> in the
      story's markdown frontmatter to the filename.
    </p>
  </div>
</body>
</html>
